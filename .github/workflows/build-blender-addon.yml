name: Build Blender Addon

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build:blender

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyhydra-blender-addon
          path: polyhydra-blender-addon.zip

      - name: Generate tag name
        if: contains(github.event.head_commit.message, '[RELEASE]')
        id: tag
        run: echo "name=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create release
        if: contains(github.event.head_commit.message, '[RELEASE]')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: polyhydra-blender-addon.zip
